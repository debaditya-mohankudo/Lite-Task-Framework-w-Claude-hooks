<div class="create-form">
  <h2>New Task</h2>
  {% if error %}
  <div class="form-error">{{ error }}</div>
  {% endif %}
  <form hx-post="/ui/tasks"
        hx-target="#sidebar"
        hx-swap="innerHTML">

    <div class="form-group">
      <label>Title *</label>
      <input type="text" name="title" required placeholder="Short task title">
    </div>

    <div class="form-group">
      <label>Body</label>
      <textarea name="body" placeholder="Type: feature&#10;&#10;Task: ...&#10;Motivation: ...&#10;Resolution: ..."></textarea>
    </div>

    <div class="form-group">
      <label>Type</label>
      <select name="issue_type">
        <option value="task">task</option>
        <option value="story">story</option>
        <option value="epic">epic</option>
        <option value="bug">bug</option>
        <option value="subtask">subtask</option>
      </select>
    </div>

    <div class="form-group">
      <label>Parent (epic / story)</label>
      <select name="parent_id">
        <option value="">— none —</option>
        {% for e in epics %}
        <option value="{{ e.id }}">{{ e.issue_type }} {{ e.id[:4] }} · {{ e.title }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">Create</button>
      <button type="button" class="btn-cancel"
              onclick="document.getElementById('detail-panel').innerHTML='<div class=empty-state>Select a task to view details</div>'">
        Cancel
      </button>
    </div>
  </form>
</div>
