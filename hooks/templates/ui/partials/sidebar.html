<section class="sidebar-inner">
  <div class="sidebar-header">TASKS</div>

  <div class="status-tabs">
    <a class="tab {% if status == 'all' %}active{% endif %}"
       hx-get="/ui/?status=all" hx-target="#sidebar" hx-swap="innerHTML">all</a>
    <a class="tab {% if status == 'wip' %}active{% endif %}"
       hx-get="/ui/?status=wip" hx-target="#sidebar" hx-swap="innerHTML">wip</a>
    <a class="tab {% if status == 'open' %}active{% endif %}"
       hx-get="/ui/?status=open" hx-target="#sidebar" hx-swap="innerHTML">open</a>
  </div>

  <ul class="task-tree">
    {% for task in tasks %}
      {% if not task.parent_id %}
        {# Epic / root task #}
        <li class="task-epic">
          <span class="issue-badge">{{ task.issue_type }}</span>
          <span class="task-id">{{ task.id[:4] }}</span>
          {{ task.title }}
        </li>
      {% else %}
        {# Child task #}
        <li class="task-row {% if task.status == 'wip' %}is-wip{% endif %}"
            hx-get="/ui/tasks/{{ task.id }}"
            hx-target="#detail-panel"
            hx-swap="innerHTML">
          <span class="status-dot
            {% if task.status == 'wip' %}dot-wip
            {% elif task.status == 'done' %}dot-done
            {% else %}dot-open{% endif %}"></span>
          {{ task.title }}
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</section>
