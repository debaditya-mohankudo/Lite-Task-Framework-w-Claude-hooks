{% if issue_type == "bug" %}

<div class="form-group">
  <label>Description <span class="label-hint">(what's broken)</span></label>
  <textarea name="body_task" rows="2" placeholder="What is the bug?"></textarea>
</div>
<div class="form-group">
  <label>Steps to Reproduce</label>
  <textarea name="body_motivation" rows="3" placeholder="1. ...&#10;2. ...&#10;3. ..."></textarea>
</div>
<div class="form-group">
  <label>Expected <span class="label-hint">vs</span> Actual</label>
  <textarea name="body_resolution" rows="2" placeholder="Expected: ...&#10;Actual: ..."></textarea>
</div>

{% elif issue_type == "epic" %}

<div class="form-group">
  <label>Overview <span class="label-hint">(what this epic covers)</span></label>
  <textarea name="body_task" rows="3" placeholder="High-level description of the epic..."></textarea>
</div>
<div class="form-group">
  <label>Motivation <span class="label-hint">(why)</span></label>
  <textarea name="body_motivation" rows="2" placeholder="Why does this epic exist?"></textarea>
</div>
<input type="hidden" name="body_resolution" value="">

{% elif issue_type == "subtask" %}

<div class="form-group">
  <label>Task <span class="label-hint">(what needs to be done)</span></label>
  <textarea name="body_task" rows="3" placeholder="Describe what needs to be done..."></textarea>
</div>
<input type="hidden" name="body_motivation" value="">
<input type="hidden" name="body_resolution" value="">

{% else %} {# story / task (default) #}

<div class="form-group">
  <label>Task <span class="label-hint">(what needs to be done)</span></label>
  <textarea name="body_task" rows="2" placeholder="Describe what needs to be done..."></textarea>
</div>
<div class="form-group">
  <label>Motivation <span class="label-hint">(why)</span></label>
  <textarea name="body_motivation" rows="2" placeholder="Why is this needed?"></textarea>
</div>
<div class="form-group">
  <label>Resolution <span class="label-hint">(how / done when)</span></label>
  <textarea name="body_resolution" rows="2" placeholder="How will it be implemented / what does done look like?"></textarea>
</div>

{% endif %}
