{% if active and active.task_id %}
<div class="cockpit-strip">
  <div class="cockpit-left">
    <span class="cockpit-label">ACTIVE</span>
    <span class="cockpit-task-id">task:{{ active.task_id[:8] }}</span>
    <span class="cockpit-sep">·</span>
    <span class="cockpit-meta">session {{ active.session_id[:6] }}</span>
    <span class="cockpit-sep">·</span>
    <span class="cockpit-meta">turn {{ active.turn }}</span>
  </div>
  <div class="cockpit-title">{{ active.title }}</div>
  <div class="cockpit-actions">
    <button class="cockpit-btn cockpit-btn-detail"
            onclick="htmx.ajax('GET','{{ urls.tasks }}{{ active.task_id }}',{target:'#detail-panel',swap:'innerHTML'})">
      View
    </button>
  </div>
</div>
{% endif %}
