<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-hooks tasks</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    function toggleMoreTags(taskId, allLabels) {
      const row = document.getElementById('label-tag-row-' + taskId);
      if (!row) return;
      const moreBtn = row.querySelector('.tag-more');
      const showing = row.querySelectorAll('.tag-default').length;
      if (showing <= 4) {
        // expand — show all
        allLabels.forEach((tag, i) => {
          if (i >= 4) {
            const span = document.createElement('span');
            span.className = 'tag tag-default';
            span.textContent = tag;
            row.insertBefore(span, moreBtn);
          }
        });
        moreBtn.textContent = 'less';
      } else {
        // collapse — remove extras
        row.querySelectorAll('.tag-default').forEach((el, i) => { if (i >= 4) el.remove(); });
        moreBtn.textContent = '+' + (allLabels.length - 4) + ' more';
      }
    }

    function toggleEpic(epicEl) {
      const isCollapsed = epicEl.classList.toggle('is-collapsed');
      const arrow = epicEl.querySelector('.epic-toggle');
      let el = epicEl.nextElementSibling;
      while (el && el.classList.contains('task-row')) {
        el.style.display = isCollapsed ? 'none' : '';
        el = el.nextElementSibling;
      }
      if (arrow) arrow.textContent = isCollapsed ? '▶' : '▼';
    }

    function openSearch() {
      const overlay = document.getElementById('search-overlay');
      overlay.classList.add('is-open');
      document.getElementById('search-input').focus();
      document.getElementById('search-input').select();
    }

    function closeSearch() {
      document.getElementById('search-overlay').classList.remove('is-open');
      document.getElementById('search-results').innerHTML = '';
      document.getElementById('search-input').value = '';
      document.getElementById('search-count').textContent = '';
    }

    function selectSidebarTask(taskId) {
      document.querySelectorAll('.task-row.is-selected').forEach(r => r.classList.remove('is-selected'));
      const row = document.querySelector('.task-row[hx-get="{{ urls.tasks }}' + taskId + '"]');
      if (row) row.classList.add('is-selected');
    }

    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
      }
      if (e.key === 'Escape') closeSearch();
    });

    function toggleSession(headerEl) {
      const body = headerEl.nextElementSibling;
      const arrow = headerEl.querySelector('.turn-session-toggle');
      const collapsed = headerEl.classList.toggle('collapsed');
      body.classList.toggle('hidden', collapsed);
      if (arrow) arrow.textContent = collapsed ? '▶' : '▼';
    }

    document.addEventListener("htmx:responseError", function(evt) {
      const panel = document.getElementById("detail-panel");
      if (panel) {
        panel.innerHTML = '<div class="error-panel"><div class="error-icon">⚠</div><div class="error-message">Request failed (' + evt.detail.xhr.status + ')</div></div>';
      }
    });

    document.addEventListener("htmx:afterSettle", function(evt) {
      if (evt.target.id === 'search-results') {
        const count = evt.target.querySelectorAll('.search-task-card, .search-decision-card, .search-memory-card').length;
        document.getElementById('search-count').textContent = count > 0 ? count + ' results' : 'no results';
      }
      if (evt.target.id === 'right-panel') {
        evt.target.classList.toggle('is-open', evt.target.innerHTML.trim() !== '');
      }
    });

  </script>
  <link rel="stylesheet" href="/ui/static/ui.css?v=8">
</head>
<body class="{% block body_class %}{% endblock %}">
  <header>
    <span class="logo">Lite Task Framework — For Solo Developers</span>
  </header>

  <div id="cockpit-wrap"
       hx-get="{{ urls.cockpit }}"
       hx-trigger="load, every 10s"
       hx-swap="innerHTML"></div>

  <div class="layout">
    <aside id="sidebar">
      {% block sidebar %}{% endblock %}
    </aside>
    <main id="detail-panel">
      {% block detail %}{% endblock %}
    </main>
    <aside id="right-panel"></aside>
  </div>

  <!-- Search overlay -->
  <div id="search-overlay" class="search-overlay" onclick="if(event.target===this) closeSearch()">
    <div class="search-modal">
      <div class="search-modal-header">
        <span class="search-logo">⇄ claude-hooks</span>
        <button class="search-close" onclick="closeSearch()">✕ close search</button>
      </div>
      <div class="search-input-row">
        <span class="search-icon">⌕</span>
        <input id="search-input"
               class="search-modal-input"
               type="text"
               placeholder="token"
               hx-get="{{ urls.search }}"
               hx-trigger="input changed delay:300ms"
               hx-target="#search-results"
               hx-swap="innerHTML"
               name="q"
               autocomplete="off">
        <span id="search-count" class="search-count"></span>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>
</body>
</html>
